{% extends 'vaccination_app/base.html' %}
{% block auth_content %}
<style>
    body { background: linear-gradient(135deg, #0f3d24 0%, #1a6b3c 60%, #27ae60 100%); }
    .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
    }
    .login-card {
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(0,0,0,0.25);
        width: 100%;
        max-width: 440px;
        overflow: hidden;
    }
    .login-header {
        background: #0f3d24;
        padding: 40px 40px 32px;
        text-align: center;
    }
    .login-icon {
        width: 64px; height: 64px;
        background: #27ae60;
        border-radius: 18px;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; color: #fff;
        margin: 0 auto 16px;
    }
    .login-title {
        color: #fff;
        font-size: 24px;
        font-weight: 800;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .login-subtitle { color: #7dc99a; font-size: 13px; margin-top: 6px; }
    .login-body { padding: 36px 40px; }
    .btn-login {
        width: 100%;
        padding: 14px;
        background: #1a6b3c;
        border: none;
        border-radius: 12px;
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-login:hover { background: #27ae60; }
    .divider { text-align: center; margin: 20px 0; color: #aaa; font-size: 13px; position: relative; }
    .divider::before, .divider::after {
        content: '';
        position: absolute;
        top: 50%; width: 40%;
        height: 1px; background: #e5e5e5;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
</style>
<div class="login-wrap">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon"><i class="fa fa-syringe"></i></div>
            <div class="login-title">VacciTrack</div>
            <div class="login-subtitle">Child Immunization Management System</div>
        </div>
        <div class="login-body">
            {% if form.errors %}
            <div class="alert alert-danger rounded-3 mb-3" style="font-size:13px;">
                Invalid username or password.
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            <div class="divider">or</div>
            <div class="text-center" style="font-size:14px; color:#555;">
                Don't have an account?
                <a href="{% url 'register' %}" style="color:#1a6b3c; font-weight:600; text-decoration:none;">Register here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
